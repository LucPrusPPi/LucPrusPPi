<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="980" viewBox="0 0 1100 980">
  <rect width="1100" height="980" fill="#F4F0E8"/>
  <rect x="0" y="0" width="14" height="980" fill="#1A1A1A"/>

  <!-- identity -->
  <text x="56" y="88" fill="#1A1A1A" font-family="Georgia, serif" font-size="64" font-weight="700">LucPrus</text>
  <text x="58" y="128" fill="#5C564C" font-family="Georgia, serif" font-size="22" font-style="italic">Tomilov Sergey / PPi Studio</text>
  <line x1="56" y1="158" x2="420" y2="158" stroke="#1A1A1A" stroke-width="1.5"/>
  <text x="56" y="198" fill="#1A1A1A" font-family="Georgia, serif" font-size="20">I build things that have to work when nobody is watching.</text>
  <text x="56" y="232" fill="#7A7368" font-family="Consolas, monospace" font-size="14">Russia / systems / products / delivery</text>

  <line x1="56" y1="270" x2="1044" y2="270" stroke="#D6CFC3" stroke-width="1"/>

  <!-- who -->
  <text x="56" y="320" fill="#1A1A1A" font-family="Georgia, serif" font-size="22" font-weight="700">Who I am</text>
  <text x="56" y="356" fill="#1A1A1A" font-family="Georgia, serif" font-size="17">I am LucPrus (Sergey Tomilov). I care about systems that survive outside a demo:</text>
  <text x="56" y="384" fill="#5C564C" font-family="Georgia, serif" font-size="17">native tools, automation, products people actually open again.</text>
  <text x="56" y="416" fill="#5C564C" font-family="Georgia, serif" font-size="17">I do not put my identity behind a framework logo.</text>

  <line x1="56" y1="452" x2="1044" y2="452" stroke="#D6CFC3" stroke-width="1"/>

  <!-- proud + diploma card -->
  <text x="56" y="502" fill="#1A1A1A" font-family="Georgia, serif" font-size="22" font-weight="700">What I am proud of</text>
  <text x="56" y="538" fill="#5C564C" font-family="Consolas, monospace" font-size="13">WIN / INNOCAMP / INNOPOLIS / 2026</text>
  <text x="56" y="586" fill="#1A1A1A" font-family="Georgia, serif" font-size="40" font-weight="700">CyberBook</text>
  <text x="56" y="624" fill="#1A1A1A" font-family="Georgia, serif" font-size="17">First place at the INNOCAMP hackathon. Case for MTS:</text>
  <text x="56" y="652" fill="#5C564C" font-family="Georgia, serif" font-size="17">a cybersecurity education product, not a weekend toy.</text>
  <text x="56" y="688" fill="#7A7368" font-family="Consolas, monospace" font-size="13">github.com/phaeton-oq/CyberBook</text>

  <!-- drawn diploma (same palette, not a photo) -->
  <g transform="translate(760,488)">
    <rect x="0" y="0" width="284" height="210" fill="#F4F0E8" stroke="#1A1A1A" stroke-width="2"/>
    <rect x="12" y="12" width="260" height="186" fill="none" stroke="#D6CFC3" stroke-width="1"/>
    <circle cx="48" cy="48" r="22" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="30" y="40" width="36" height="16" fill="#1A1A1A"/>
    <text x="33" y="52" fill="#F4F0E8" font-family="Consolas, monospace" font-size="9">DIPLOM</text>
    <text x="86" y="44" fill="#1A1A1A" font-family="Georgia, serif" font-size="14" font-weight="700">INNOCAMP</text>
    <text x="86" y="62" fill="#7A7368" font-family="Consolas, monospace" font-size="9">IT CAMP NETWORK</text>
    <line x1="28" y1="82" x2="256" y2="82" stroke="#D6CFC3" stroke-width="1"/>
    <text x="142" y="112" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, serif" font-size="16" font-weight="700">Tomilov Sergey</text>
    <text x="142" y="136" text-anchor="middle" fill="#5C564C" font-family="Georgia, serif" font-size="11">hackathon winner</text>
    <text x="142" y="156" text-anchor="middle" fill="#7A7368" font-family="Consolas, monospace" font-size="10">Innopolis / 2026</text>
    <line x1="40" y1="176" x2="120" y2="176" stroke="#1A1A1A" stroke-width="1"/>
    <text x="40" y="190" fill="#9A9286" font-family="Consolas, monospace" font-size="8">director</text>
    <circle cx="230" cy="182" r="16" fill="none" stroke="#5C564C" stroke-width="1"/>
    <text x="230" y="185" text-anchor="middle" fill="#5C564C" font-family="Consolas, monospace" font-size="7">SEAL</text>
  </g>

  <line x1="56" y1="724" x2="1044" y2="724" stroke="#D6CFC3" stroke-width="1"/>

  <!-- also -->
  <text x="56" y="774" fill="#5C564C" font-family="Consolas, monospace" font-size="12">ALSO</text>
  <text x="56" y="812" fill="#1A1A1A" font-family="Georgia, serif" font-size="26">PandaBook</text>
  <text x="240" y="812" fill="#7A7368" font-family="Georgia, serif" font-size="18" font-style="italic">diet app, collaboration</text>
  <text x="56" y="848" fill="#7A7368" font-family="Consolas, monospace" font-size="13">github.com/phaeton-oq/PandaBook</text>

  <line x1="56" y1="884" x2="1044" y2="884" stroke="#D6CFC3" stroke-width="1"/>

  <text x="56" y="930" fill="#1A1A1A" font-family="Georgia, serif" font-size="17">Quiet reliability over loud demos. Most serious work stays private.</text>
  <text x="550" y="962" text-anchor="middle" fill="#9A9286" font-family="Georgia, serif" font-size="14" font-style="italic">LucPrus / not a stack list / a person who ships</text>
</svg>
