<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440">
  <rect width="1100" height="440" fill="#F4F0E8"/>
  <rect x="0" y="0" width="14" height="440" fill="#1A1A1A"/>
  <text x="56" y="88" fill="#1A1A1A" font-family="Georgia, serif" font-size="64" font-weight="700">LucPrus</text>
  <text x="58" y="128" fill="#5C564C" font-family="Georgia, serif" font-size="22" font-style="italic">Tomilov Sergey / PPi Studio</text>
  <line x1="56" y1="158" x2="420" y2="158" stroke="#1A1A1A" stroke-width="1.5"/>
  <text x="56" y="198" fill="#1A1A1A" font-family="Georgia, serif" font-size="20">I build things that have to work when nobody is watching.</text>
  <text x="56" y="232" fill="#7A7368" font-family="Consolas, monospace" font-size="14">Russia / systems / products / delivery</text>
  <line x1="56" y1="270" x2="1044" y2="270" stroke="#D6CFC3" stroke-width="1"/>
  <text x="56" y="320" fill="#1A1A1A" font-family="Georgia, serif" font-size="22" font-weight="700">Who I am</text>
  <text x="56" y="356" fill="#1A1A1A" font-family="Georgia, serif" font-size="17">I am LucPrus (Sergey Tomilov). I care about systems that survive outside a demo:</text>
  <text x="56" y="384" fill="#5C564C" font-family="Georgia, serif" font-size="17">native tools, automation, products people actually open again.</text>
  <text x="56" y="416" fill="#5C564C" font-family="Georgia, serif" font-size="17">I do not put my identity behind a framework logo.</text>
</svg>
